# Omakase Gentoo package manifest (TOML)
# Each list is merged by scripts into one install set.

# Core system packages
base = [
  "sys-kernel/linux-firmware",
  "sys-apps/openrc",
  "app-admin/sudo",
  "sys-fs/e2fsprogs",
  "sys-fs/dosfstools",
  "sys-boot/grub",
  "sys-boot/efibootmgr"
]

# Kernel strategy (distribution kernel)
kernel = [
  "sys-kernel/gentoo-kernel-bin"
]

# Networking and remote access
network = [
  "net-misc/networkmanager",
  "net-misc/openssh",
  "net-wireless/wpa_supplicant",
  "net-misc/dhcpcd"
]

# Graphics stack for AMD
x11 = [
  "x11-base/xorg-server",
  "x11-apps/xinit",
  "x11-drivers/xf86-video-amdgpu",
  "media-libs/mesa",
  "media-libs/libglvnd",
  "media-libs/vulkan-loader"
]

# Everyday command-line tools/utilities
utils = [
  "dev-vcs/git",
  "net-misc/curl",
  "net-misc/wget",
  "app-editors/micro",
  "app-shells/bash-completion",
  "sys-apps/man-db",
  "sys-apps/less"
]
